<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Panel - Homely Bite</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #00000000; color: white; padding: 20px; }
        .admin-card { max-width: 600px; margin: auto; background: white; color: #333; padding: 20px; border-radius: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
        .driver-img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
        .btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; }
        .btn-approve { background: #2ecc71; }
        .btn-reject { background: #e74c3c; margin-left: 5px; }
    </style>
</head>
<body>

<div class="admin-card">
    <h2 style="text-align: center;">🛠 Owner Verification Panel</h2>
    <div id="no-data" style="text-align: center; display: none;">Koi naya registration nahi hai.</div>
    <table id="admin-table">
        <thead>
            <tr>
                <th>Photo</th>
                <th>Details</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="list-body"></tbody>
    </table>
</div>

<script>
    function loadData() {
        const body = document.getElementById('list-body');
        const registered = localStorage.getItem('registered');
        const status = localStorage.getItem('status');

        if(registered === 'true' && status === 'pending') {
            body.innerHTML = `
                <tr>
                    <td><img src="${localStorage.getItem('p-pic')}" class="driver-img"></td>
                    <td><b>${localStorage.getItem('name')}</b><br>Umar: ${localStorage.getItem('age')}</td>
                    <td>
                        <button class="btn btn-approve" onclick="action('approved')">Approve</button>
                        <button class="btn btn-reject" onclick="action('rejected')">Reject</button>
                    </td>
                </tr>`;
        } else {
            document.getElementById('admin-table').style.display = 'none';
            document.getElementById('no-data').style.display = 'block';
        }
    }

    function action(type) {
        if(type === 'approved') {
            localStorage.setItem('status', 'approved');
            alert("Driver Approve ho gaya!");
        } else {
            localStorage.clear();
            alert("Driver Reject kar diya gaya!");
        }
        location.reload();
    }

    window.onload = loadData;
</script>
</body>
</html>
