<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homely Bite - Delivery Partner</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #d32f2f; --bg: #f2f2f2; --success: #28a745; --blue: #007bff; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: #333; }

        .header { background: var(--primary); color: white; padding: 10px; text-align: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .header h1 { margin: 0; font-size: 20px; }
        
        .view { padding: 10px; padding-bottom: 50px; }

        /* Compact Order Card */
        .order-card { 
            background: white; 
            border-radius: 10px; 
            padding: 12px; 
            margin-bottom: 15px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-left: 4px solid var(--primary);
        }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .info-item b { font-size: 11px; color: #777; display: block; text-transform: uppercase; }
        .info-item p { margin: 2px 0; font-size: 14px; font-weight: 600; }

        .items-box { 
            background: #f9f9f9; 
            padding: 8px; 
            border-radius: 6px; 
            font-size: 13px; 
            border: 1px dashed #ddd;
            margin: 8px 0;
        }

        .bill-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 8px 0;
            border-top: 1px solid #eee;
        }
        .bill-amt { font-size: 18px; font-weight: bold; color: var(--success); }

        /* OTP & QR Section */
        .otp-container { display: flex; gap: 8px; margin-top: 10px; }
        .otp-input { 
            flex: 1;
            padding: 10px; 
            border: 2px solid #ddd; 
            border-radius: 6px; 
            font-size: 16px; 
            text-align: center; 
        }
        .verify-btn { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 10px 15px; 
            border-radius: 6px; 
            font-weight: bold; 
            cursor: pointer; 
        }

        .qr-box { 
            display: none; 
            text-align: center; 
            margin-top: 10px; 
            padding: 15px; 
            background: #fff; 
            border: 2px solid var(--blue); 
            border-radius: 8px; 
        }
        .qr-box img { width: 100%; max-width: 180px; margin: 10px 0; }
        
        .empty-msg { text-align: center; margin-top: 40px; color: #999; font-size: 14px; }
        
        /* Blue Tick Styling */
        .confirm-label { color: var(--blue); font-weight: bold; font-size: 16px; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

    <div class="header">
        <h1>HOMELY BITE</h1>
        <p style="margin:0; font-size:12px;">Partner Delivery Dashboard</p>
    </div>

    <div id="main-view" class="view">
        <h4 style="margin: 0 0 10px 5px;"><i class="fas fa-route"></i> Active Deliveries</h4>
        <div id="delivery-list"></div>
    </div>

    <script>
        window.onload = () => {
            loadAllOrders();
        };

        function loadAllOrders() {
            const orders = JSON.parse(localStorage.getItem('hOrders') || "[]");
            const user = JSON.parse(localStorage.getItem('hUser') || '{"name":"No Name","addr":"Not Set","phone":"0000"}');
            const listContainer = document.getElementById('delivery-list');

            if (orders.length === 0) {
                listContainer.innerHTML = `<div class="empty-msg">No active orders found.</div>`;
                return;
            }

            listContainer.innerHTML = orders.reverse().map((order) => `
                <div class="order-card" id="card-${order.id}">
                    <div class="info-grid">
                        <div class="info-item">
                            <b>Customer</b>
                            <p>${user.name}</p>
                        </div>
                        <div class="info-item">
                            <b>Contact</b>
                            <p>${user.phone}</p>
                        </div>
                    </div>
                    <div class="info-item" style="margin-bottom:8px;">
                        <b>Address</b>
                        <p style="font-size:13px;">${user.addr}</p>
                    </div>

                    <div class="items-box">
                        ${order.itemsHTML}
                    </div>

                    <div class="bill-row">
                        <span style="font-weight:bold; font-size:14px;">Total Bill:</span>
                        <span class="bill-amt">${order.totalPrice || order.total || '₹0'}</span>
                    </div>

                    <div id="otp-area-${order.id}" style="${order.status === 'delivered' ? 'display:none' : 'block'}">
                        <div class="otp-container">
                            <input type="number" id="input-otp-${order.id}" class="otp-input" placeholder="Enter OTP">
                            <button class="verify-btn" onclick="verifyOrder(${order.id}, ${order.otp})">VERIFY</button>
                        </div>
                    </div>

                    <div class="qr-box" id="qr-area-${order.id}" style="${order.status === 'delivered' ? 'display:block' : 'none'}">
                        <span class="confirm-label">
                            <i class="fas fa-check-circle"></i> CONFIRMED ORDER <i class="fas fa-check-double"></i>
                        </span>
                        <img src="1000168766.jpg" alt="QR Code">
                        <br>
                        <small>Scan to receive <b>${order.totalPrice || order.total || '₹0'}</b></small>
                    </div>
                </div>
            `).join('');
        }

        function verifyOrder(orderId, correctOtp) {
            const inputVal = document.getElementById(`input-otp-${orderId}`).value;
            
            if (inputVal == correctOtp) {
                // Status update in localStorage so it stays verified
                let orders = JSON.parse(localStorage.getItem('hOrders') || "[]");
                orders = orders.map(o => { if(o.id === orderId) o.status = 'delivered'; return o; });
                localStorage.setItem('hOrders', JSON.stringify(orders));

                // UI Update
                document.getElementById(`otp-area-${orderId}`).style.display = 'none';
                document.getElementById(`qr-area-${orderId}`).style.display = 'block';
            } else {
                alert("Invalid OTP! Please check again.");
            }
        }
    </script>
</body>
</html>
