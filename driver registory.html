<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homely Bite - Delivery Partner</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>

        :root{
            --primary:#d32f2f;
            --bg:#f2f2f2;
            --success:#28a745;
            --blue:#007bff;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Segoe UI',sans-serif;
            background:var(--bg);
            color:#333;
        }

        .header{
            background:var(--primary);
            color:white;
            padding:14px;
            position:sticky;
            top:0;
            z-index:100;
            box-shadow:0 2px 5px rgba(0,0,0,0.1);
        }

        .header-top{
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .header h1{
            font-size:22px;
            margin-bottom:4px;
        }

        .header p{
            font-size:12px;
        }

        .partner-profile{
            width:48px;
            height:48px;
            border-radius:50%;
            background:white;
            color:var(--primary);
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:22px;
            cursor:pointer;
            font-weight:bold;
        }

        .view{
            padding:12px;
            padding-bottom:80px;
        }

        .title{
            margin-bottom:14px;
            font-size:18px;
            color:#222;
        }

        .order-card{
            background:white;
            border-radius:12px;
            padding:14px;
            margin-bottom:18px;
            box-shadow:0 3px 10px rgba(0,0,0,0.08);
            border-left:5px solid var(--primary);
        }

        .status-box{
            margin-bottom:12px;
        }

        .status{
            display:inline-block;
            padding:8px 14px;
            border-radius:30px;
            color:white;
            font-size:13px;
            font-weight:bold;
        }

        .pending{
            background:#d32f2f;
        }

        .delivered{
            background:#28a745;
        }

        .info-grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:10px;
            margin-bottom:10px;
        }

        .info-item b{
            font-size:11px;
            color:#888;
            text-transform:uppercase;
            display:block;
            margin-bottom:3px;
        }

        .info-item p{
            font-size:14px;
            font-weight:600;
        }

        .phone-row{
            display:flex;
            align-items:center;
            gap:10px;
        }

        .call-btn{
            width:34px;
            height:34px;
            border-radius:50%;
            background:var(--success);
            color:white;
            display:flex;
            align-items:center;
            justify-content:center;
            text-decoration:none;
            font-size:14px;
        }

        .address-box{
            margin-bottom:10px;
        }

        .address-box p{
            font-size:13px;
            line-height:1.4;
        }

        .items-box{
            background:#fafafa;
            border:1px dashed #ccc;
            border-radius:8px;
            padding:10px;
            margin:10px 0;
            font-size:13px;
            line-height:1.5;
        }

        .bill-row{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:10px 0;
            border-top:1px solid #eee;
        }

        .bill-row span{
            font-size:15px;
            font-weight:bold;
        }

        .bill-amt{
            color:var(--success);
            font-size:20px !important;
        }

        .otp-container{
            display:flex;
            gap:10px;
            margin-top:12px;
        }

        .otp-input{
            flex:1;
            padding:12px;
            border-radius:8px;
            border:2px solid #ddd;
            outline:none;
            font-size:16px;
            text-align:center;
        }

        .otp-input:focus{
            border-color:var(--primary);
        }

        .verify-btn{
            background:var(--primary);
            color:white;
            border:none;
            padding:12px 18px;
            border-radius:8px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        .verify-btn:hover{
            opacity:0.9;
        }

        .payment-options{
            display:none;
            gap:10px;
            margin-top:15px;
        }

        .pay-btn{
            flex:1;
            border:none;
            padding:12px;
            border-radius:8px;
            font-weight:bold;
            cursor:pointer;
            color:white;
            font-size:14px;
        }

        .cash-btn{
            background:var(--success);
        }

        .qr-btn{
            background:var(--blue);
        }

        .camera-box{
            display:none;
            margin-top:15px;
            text-align:center;
            border:2px solid var(--success);
            border-radius:10px;
            padding:15px;
            background:white;
        }

        .camera-box video{
            width:100%;
            border-radius:10px;
            margin-bottom:10px;
        }

        .camera-box canvas{
            width:100%;
            border-radius:10px;
            margin-top:10px;
        }

        .camera-buttons{
            display:flex;
            gap:10px;
            margin-top:10px;
        }

        .camera-buttons button{
            flex:1;
            border:none;
            padding:10px;
            border-radius:8px;
            color:white;
            font-weight:bold;
            cursor:pointer;
        }

        .capture-btn{
            background:var(--primary);
        }

        .close-camera{
            background:#444;
        }

        .qr-box{
            display:none;
            margin-top:15px;
            text-align:center;
            border:2px solid var(--blue);
            border-radius:10px;
            padding:15px;
            background:white;
        }

        .confirm-label{
            color:var(--blue);
            font-size:17px;
            font-weight:bold;
            display:block;
            margin-bottom:12px;
        }

        .qr-box img{
            width:180px;
            height:180px;
            object-fit:cover;
            border-radius:10px;
            border:1px solid #ddd;
            margin-bottom:10px;
        }

        .close-qr{
            margin-top:12px;
            background:#444;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:8px;
            cursor:pointer;
            font-weight:bold;
        }

        .empty-msg{
            text-align:center;
            margin-top:50px;
            color:#777;
            font-size:15px;
        }

        @media(max-width:600px){

            .info-grid{
                grid-template-columns:1fr;
            }

            .otp-container{
                flex-direction:column;
            }

            .verify-btn{
                width:100%;
            }

            .payment-options{
                flex-direction:column;
            }

            .camera-buttons{
                flex-direction:column;
            }
        }

    </style>

</head>

<body>

    <!-- HEADER -->

    <div class="header">

        <div class="header-top">

            <div>
                <h1>HOMELY BITE</h1>
                <p>Partner Delivery Dashboard</p>
            </div>

            <!-- PARTNER PROFILE -->

            <div class="partner-profile" title="Partner Profile">

                <i class="fas fa-user"></i>

            </div>

        </div>

    </div>

    <!-- MAIN -->

    <div class="view">

        <h3 class="title">

            <i class="fas fa-route"></i>

            Active Deliveries

        </h3>

        <div id="delivery-list"></div>

    </div>

<script>

    // SAMPLE ORDERS

    if(!localStorage.getItem("hOrders")){

        const sampleOrders = [

            {
                id:1001,
                otp:1234,
                status:"pending",
                paymentDone:false,

                itemsHTML:`
                    • 2 x Veg Burger <br>
                    • 1 x Fries <br>
                    • 1 x Cold Drink
                `,

                totalPrice:"₹299",

                customer:{
                    name:"Rahul Sharma",
                    phone:"9876543210",
                    addr:"Delhi, India"
                }
            },

            {
                id:1002,
                otp:5678,
                status:"pending",
                paymentDone:false,

                itemsHTML:`
                    • 1 x Pizza <br>
                    • 2 x Coke
                `,

                totalPrice:"₹499",

                customer:{
                    name:"Aman Verma",
                    phone:"9999999999",
                    addr:"Noida, India"
                }
            }

        ];

        localStorage.setItem("hOrders", JSON.stringify(sampleOrders));
    }

    // PAGE LOAD

    window.onload = () => {

        loadAllOrders();

    };

    // LOAD ORDERS

    function loadAllOrders(){

        const orders =
            JSON.parse(localStorage.getItem('hOrders') || "[]");

        const listContainer =
            document.getElementById('delivery-list');

        if(orders.length === 0){

            listContainer.innerHTML = `
                <div class="empty-msg">
                    No active orders found.
                </div>
            `;

            return;
        }

        listContainer.innerHTML = orders.reverse().map(order => `

            <div class="order-card">

                <!-- STATUS -->

                <div class="status-box">

                    <span
                        id="status-${order.id}"
                        class="status ${order.status === 'delivered'
                            ? 'delivered'
                            : 'pending'}"
                    >

                        ${order.status === 'delivered'
                            ? 'DELIVERED'
                            : 'PENDING PAYMENT'}

                    </span>

                </div>

                <!-- CUSTOMER -->

                <div class="info-grid">

                    <div class="info-item">

                        <b>Customer</b>

                        <p>
                            ${order.customer?.name || 'No Name'}
                        </p>

                    </div>

                    <div class="info-item">

                        <b>Contact</b>

                        <div class="phone-row">

                            <p>
                                ${order.customer?.phone || '0000000000'}
                            </p>

                            <a
                                href="tel:${order.customer?.phone}"
                                class="call-btn"
                            >
                                <i class="fas fa-phone"></i>
                            </a>

                        </div>

                    </div>

                </div>

                <!-- ADDRESS -->

                <div class="address-box">

                    <div class="info-item">

                        <b>Address</b>

                        <p>
                            ${order.customer?.addr || 'No Address'}
                        </p>

                    </div>

                </div>

                <!-- ITEMS -->

                <div class="items-box">

                    ${order.itemsHTML}

                </div>

                <!-- BILL -->

                <div class="bill-row">

                    <span>Total Bill</span>

                    <span class="bill-amt">

                        ${order.totalPrice || '₹0'}

                    </span>

                </div>

                <!-- OTP -->

                <div
                    id="otp-area-${order.id}"
                    style="${order.paymentDone ? 'display:none' : 'block'}"
                >

                    <div class="otp-container">

                        <input
                            type="number"
                            id="input-otp-${order.id}"
                            class="otp-input"
                            placeholder="Enter OTP"
                        >

                        <button
                            class="verify-btn"
                            onclick="verifyOrder(${order.id}, ${order.otp})"
                        >

                            VERIFY

                        </button>

                    </div>

                </div>

                <!-- PAYMENT OPTIONS -->

                <div
                    class="payment-options"
                    id="payment-options-${order.id}"
                    style="${order.status === 'otpverified'
                        ? 'flex'
                        : 'none'}"
                >

                    <!-- CASH -->

                    <button
                        class="pay-btn cash-btn"
                        onclick="openCamera(${order.id})"
                    >

                        <i class="fas fa-camera"></i>

                        CASH

                    </button>

                    <!-- QR -->

                    <button
                        class="pay-btn qr-btn"
                        onclick="showQR(${order.id})"
                    >

                        <i class="fas fa-qrcode"></i>

                        QR PAY

                    </button>

                </div>

                <!-- CAMERA -->

                <div
                    class="camera-box"
                    id="camera-box-${order.id}"
                >

                    <h4 style="margin-bottom:10px;">

                        Cash Payment Proof

                    </h4>

                    <video
                        id="video-${order.id}"
                        autoplay
                        playsinline
                    ></video>

                    <canvas
                        id="canvas-${order.id}"
                    ></canvas>

                    <div class="camera-buttons">

                        <button
                            class="capture-btn"
                            onclick="capturePhoto(${order.id})"
                        >

                            TAKE PHOTO

                        </button>

                        <button
                            class="close-camera"
                            onclick="closeCamera(${order.id})"
                        >

                            CLOSE

                        </button>

                    </div>

                </div>

                <!-- QR BOX -->

                <div
                    class="qr-box"
                    id="qr-area-${order.id}"
                >

                    <span class="confirm-label">

                        <i class="fas fa-qrcode"></i>

                        WAITING FOR PAYMENT

                    </span>

                    <img
                        src="C:\Users\Deepak Singh\Pictures\Screenshots\Screenshot 2026-05-24 115957.png"
                        alt="QR Code"
                    >

                    <br>

                    <small>

                        Customer needs to pay

                        <b>${order.totalPrice || '₹0'}</b>

                    </small>

                    <br><br>

                    <!-- PAYMENT RECEIVED -->

                    <button
                        class="verify-btn"
                        onclick="confirmPayment(${order.id})"
                        style="
                            width:100%;
                            background:#28a745;
                        "
                    >

                        PAYMENT RECEIVED

                    </button>

                    <br><br>

                    <!-- CLOSE -->

                    <button
                        class="close-qr"
                        onclick="closeQR(${order.id})"
                    >

                        CLOSE QR

                    </button>

                </div>

            </div>

        `).join('');

    }

    // VERIFY OTP

    function verifyOrder(orderId, correctOtp){

        const inputVal =
            document.getElementById(`input-otp-${orderId}`).value;

        if(inputVal == correctOtp){

            let orders =
                JSON.parse(localStorage.getItem('hOrders') || "[]");

            orders = orders.map(order => {

                if(order.id === orderId){

                    order.status = 'otpverified';

                }

                return order;

            });

            localStorage.setItem('hOrders', JSON.stringify(orders));

            // HIDE OTP

            document.getElementById(`otp-area-${orderId}`).style.display = 'none';

            // SHOW PAYMENT OPTIONS

            document.getElementById(`payment-options-${orderId}`).style.display = 'flex';

            alert("OTP Verified Successfully!");

        }

        else{

            alert("Invalid OTP!");

        }

    }

    // SHOW QR

    function showQR(orderId){

        document.getElementById(`qr-area-${orderId}`).style.display = 'block';

    }

    // CLOSE QR

    function closeQR(orderId){

        document.getElementById(`qr-area-${orderId}`).style.display = 'none';

    }

    // CONFIRM QR PAYMENT

    function confirmPayment(orderId){

        let orders =
            JSON.parse(localStorage.getItem('hOrders') || "[]");

        orders = orders.map(order => {

            if(order.id === orderId){

                order.paymentDone = true;

                order.status = 'delivered';

            }

            return order;

        });

        localStorage.setItem('hOrders', JSON.stringify(orders));

        // UPDATE STATUS

        const status =
            document.getElementById(`status-${orderId}`);

        status.innerHTML = "DELIVERED";

        status.classList.remove('pending');

        status.classList.add('delivered');

        // HIDE QR

        document.getElementById(`qr-area-${orderId}`).style.display = 'none';

        alert("Payment Received Successfully!");

    }

    // OPEN CAMERA

    async function openCamera(orderId){

        const cameraBox =
            document.getElementById(`camera-box-${orderId}`);

        const video =
            document.getElementById(`video-${orderId}`);

        cameraBox.style.display = 'block';

        try{

            const stream =
                await navigator.mediaDevices.getUserMedia({
                    video:true
                });

            video.srcObject = stream;

            window[`stream_${orderId}`] = stream;

        }

        catch(err){

            alert("Camera Permission Denied!");

        }

    }

    // CAPTURE PHOTO

    function capturePhoto(orderId){

        const video =
            document.getElementById(`video-${orderId}`);

        const canvas =
            document.getElementById(`canvas-${orderId}`);

        const ctx =
            canvas.getContext('2d');

        canvas.width = video.videoWidth;

        canvas.height = video.videoHeight;

        ctx.drawImage(video,0,0);

        // SAVE PAYMENT STATUS

        let orders =
            JSON.parse(localStorage.getItem('hOrders') || "[]");

        orders = orders.map(order => {

            if(order.id === orderId){

                order.paymentDone = true;

                order.status = 'delivered';

            }

            return order;

        });

        localStorage.setItem('hOrders', JSON.stringify(orders));

        // UPDATE STATUS

        const status =
            document.getElementById(`status-${order.id}`);

        status.innerHTML = "CASH RECEIVED";

        status.classList.remove('pending');

        status.classList.add('delivered');

        alert("Cash Payment Photo Captured!");

    }

    // CLOSE CAMERA

    function closeCamera(orderId){

        const cameraBox =
            document.getElementById(`camera-box-${orderId}`);

        cameraBox.style.display = 'none';

        const stream =
            window[`stream_${orderId}`];

        if(stream){

            stream.getTracks().forEach(track => track.stop());

        }

    }

</script>

</body>
</html>
